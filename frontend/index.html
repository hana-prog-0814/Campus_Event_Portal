<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>All Events</h2>

    <div id="events"></div>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
}

async function loadEvents() {

    const res = await fetch("https://campus-event-portal-wjcw.onrender.com/events", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    console.log(data); // 🔍 debug

    const events = data.events || data; // handles both formats

    let html = "";

    events.forEach(e => {

        html += `
            <div class="card">
                <h3>${e.title}</h3>
                <p>${e.description}</p>
                <p>${e.event_date} | ${e.venue}</p>

                <button onclick="register(${e.id})">
                    Register
                </button>
            </div>
        `;
    });

    document.getElementById("events").innerHTML = html;
}
async function register(eventId) {

    const phone = prompt("Enter your phone number:");
    const department = prompt("Enter your department:");
    const year = prompt("Enter your year:");

    if (!phone || !department || !year) {
        alert("Please fill all fields");
        return;
    }

    const res = await fetch(
        `https://campus-event-portal-wjcw.onrender.com/events/${eventId}/register`,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                phone: phone,
                department: department,
                year: year
            })
        }
    );

    const data = await res.json();
    alert(data.message);
}

loadEvents();
</script>

</body>
</html>
